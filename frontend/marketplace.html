<!DOCTYPE html>
<html>

<head>

<title>SoulCraft Marketplace</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
font-family:Arial;
color:white;
}

.navbar{
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
}

.brand{
font-weight:700;
font-size:24px;
}

.section-title{
font-weight:600;
margin-bottom:30px;
}

.product-card{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition:0.3s;
color:black;
}

.product-card:hover{
transform:translateY(-8px);
}

.product-card img{
height:200px;
object-fit:cover;
}

.price{
font-size:20px;
font-weight:700;
color:#27ae60;
}

.artisan{
font-size:14px;
color:#555;
}

.upi{
font-size:13px;
color:#888;
}

.buyBtn{
border-radius:10px;
font-weight:600;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark">

<div class="container">

<div class="brand">SoulCraft Marketplace</div>

<div>

<a href="orders.html" class="btn btn-outline-light me-2">
Orders
</a>

<button class="btn btn-danger" onclick="logout()">
Logout
</button>

</div>

</div>

</nav>

<div class="container mt-5">

<h2 class="section-title">Handmade Artisan Products</h2>

<div class="row g-4" id="products"></div>

</div>

<script>

/* check login */

const user = JSON.parse(localStorage.getItem("user"));

if(!user){

window.location="login.html";

}


/* logout */

function logout(){

localStorage.removeItem("user");

window.location="login.html";

}


/* load products */

async function loadProducts(){

const res = await fetch("http://localhost:4000/api/products");

const products = await res.json();

const container = document.getElementById("products");

container.innerHTML="";

if(products.length===0){

container.innerHTML="<p class='text-white'>No artisan products yet</p>";
return;

}

products.forEach(p=>{

container.innerHTML+=`

<div class="col-md-3">

<div class="card product-card">

<img src="${p.image_url}" class="card-img-top">

<div class="card-body">

<h5>${p.title}</h5>

<p class="text-muted small">${p.description}</p>

<div class="price">₹${p.price}</div>

<p class="artisan">Artisan: ${p.name}</p>

<p class="upi">UPI: ${p.upi_id}</p>

<button
class="btn btn-success w-100 buyBtn"
data-id="${p.id}"
data-price="${p.price}"
>

Buy Now

</button>

</div>

</div>

</div>

`;

});

}

loadProducts();

/* auto refresh */

setInterval(loadProducts,5000);


/* razorpay */

document.addEventListener("click", async function(e){

if(!e.target.classList.contains("buyBtn")) return;

const id = e.target.dataset.id;
const price = e.target.dataset.price;

const options = {

key:"rzp_test_RON6tSrjBgbF6h",

amount:price*100,

currency:"INR",

name:"SoulCraft Marketplace",

description:"Handmade Product Purchase",

handler: async function(response){

await fetch("http://localhost:4000/api/order",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

product_id:id,
payment_id:response.razorpay_payment_id,
user_id:user.id

})

});

window.location.href="orders.html";

}

};

const rzp = new Razorpay(options);

rzp.open();

});

</script>

</body>

</html>
