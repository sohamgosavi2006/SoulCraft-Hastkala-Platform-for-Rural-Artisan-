<!DOCTYPE html>
<html>

<head>

<title>SoulCraft Register</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

.auth-container{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.auth-card{
width:420px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
padding:35px;
background:white;
}

.auth-title{
font-weight:700;
color:#1cc88a;
text-align:center;
margin-bottom:10px;
}

.auth-subtitle{
text-align:center;
color:#777;
margin-bottom:25px;
}

.form-error{
font-size:13px;
color:red;
margin-top:2px;
}

</style>

</head>

<body>

<div class="auth-container">

<div class="auth-card">

<h2 class="auth-title">SoulCraft</h2>

<p class="auth-subtitle">Create your account</p>

<input id="name" class="form-control mb-1" placeholder="Full Name">
<div id="nameError" class="form-error"></div>

<input id="email" class="form-control mt-2 mb-1" placeholder="Email">
<div id="emailError" class="form-error"></div>

<input id="phone" class="form-control mt-2 mb-1" placeholder="Phone">
<div id="phoneError" class="form-error"></div>

<input id="password" type="password" class="form-control mt-2 mb-1" placeholder="Password">
<div id="passwordError" class="form-error"></div>

<input id="address" class="form-control mt-2 mb-1" placeholder="Address">
<div id="addressError" class="form-error"></div>

<input id="city" class="form-control mt-2 mb-1" placeholder="City">
<div id="cityError" class="form-error"></div>

<input id="state" class="form-control mt-2 mb-1" placeholder="State">
<div id="stateError" class="form-error"></div>

<input id="pincode" class="form-control mt-2 mb-1" placeholder="Pincode">
<div id="pincodeError" class="form-error"></div>

<button onclick="registerUser()" class="btn btn-success w-100 mt-3">

Create Account

</button>

<div class="text-center mt-3">

Already registered?
<a href="login.html">Login</a>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="auth.js"></script>

</body>

</html>
