<!DOCTYPE html>
<html>

<head>

<title>SoulCraft Orders</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
font-family:Arial;
color:white;
}

.navbar{
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
}

.brand{
font-weight:700;
font-size:24px;
}

.card{
border-radius:16px;
background:white;
color:black;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.table th{
background:#f5f5f5;
}

.badge{
font-size:13px;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark">

<div class="container">

<div class="brand">SoulCraft Orders</div>

<div>

<a href="marketplace.html" class="btn btn-outline-light me-2">
Marketplace
</a>

<button class="btn btn-danger" onclick="logout()">
Logout
</button>

</div>

</div>

</nav>

<div class="container mt-5">

<h2>Order Dashboard</h2>

<div class="card mt-4">

<div class="card-body">

<table class="table table-hover">

<thead>

<tr>

<th>Order ID</th>
<th>Product</th>
<th>Price</th>
<th>Status</th>
<th>Transaction ID</th>
<th>Estimated Delivery</th>

</tr>

</thead>

<tbody id="orders"></tbody>

</table>

</div>

</div>

</div>

<script>

/* check login */

const user = JSON.parse(localStorage.getItem("user"));

if(!user){

window.location="login.html";

}

function logout(){

localStorage.removeItem("user");

window.location="login.html";

}


/* load orders */

async function loadOrders(){

const res = await fetch(
"http://localhost:4000/api/orders/"+user.id
);

const orders = await res.json();

const table = document.getElementById("orders");

table.innerHTML="";

if(orders.length===0){

table.innerHTML="<tr><td colspan='6'>No orders yet</td></tr>";
return;

}

orders.forEach(o=>{

table.innerHTML+=`

<tr>

<td>${o.id}</td>

<td>${o.title}</td>

<td>₹${o.price}</td>

<td>

<span class="badge bg-success">
${o.payment_status}
</span>

</td>

<td>${o.razorpay_payment_id}</td>

<td>${o.delivery_date}</td>

</tr>

`;

});

}

loadOrders();

</script>

</body>

</html>
